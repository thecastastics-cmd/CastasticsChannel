name: Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: w9jds/firebase-action@v13.3.0
        with:
          args: deploy --only hosting --project castastics-movies
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
